<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ch.6 切版練習題</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/basic_tamplate.css">
    <style>
        .box01 {
            height: 150px;
            margin-top: 15px;
            /* text-align: center; */
            font-size: 58px;
            line-height: 150px;
            font-weight: 900;
        }
        .roller {
            position: relative;
            overflow: hidden;
        }
        .roller .roller_box {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3);
            right: -100%;
            transition: right 2s;
        }
        .roller:hover .roller_box{
            right: 0;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="display-3 fw-900 text-primary">Q. 練習題</div>

        <div class="row g-3">
            <div class="d-lg-block d-md-none col-12">
                <div class="bg-success display-3 fw-900 box01 text-center">header</div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center roller">
                    <div class="roller_box">
                        01
                    </div>
                </div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center roller">02</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center">03</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center">04</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center">05</div>
            </div>
            <div class="col-12 col-sm-6 col-lg-4 col-xxl-2">
                <div class="bg-warning display-3 fw-900 box01 text-center">06</div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">01</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">02</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">03</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">04</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">05</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">06</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">07</div>
            </div>
            <div class="col-12 col-md-6 col-xl-3">
                <div class="bg-danger display-3 fw-900 box01 text-center">08</div>
            </div>
        </div>

        <div class="row g-3">
            <div class="col-12 d-none d-md-block">
                <div class="bg-info display-3 fw-900 box01 text-center">footer</div>
            </div>
        </div>
    </div>

<!--
|   |header(1) |warning(6)|danger(8)|footer(1)|
|---|----------|----------|---------|---------|
|xxl|出現      |2         |3        |出現      |
|xl |出現      |4         |3        |出現      |
|lg |出現      |4         |6        |出現      |
|md |**消失**  |6         |6        |出現      |
|sm |出現      |6         |12       |**消失**  |
|xs |出現      |12        |12       |**消失**  |
|xxs|???       |???       |???      |???      |
-->
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/jquery-4.0.0.js"></script>
</body>

</html>
