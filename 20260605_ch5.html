        @media screen and (max-width: 768px) {

            .table-rwd thead,
            .table-rwd caption {
                display: none;
            }

            .table-rwd tbody tr {
                display: block;
                margin-top: 15px;
                border: 2px solid var(--color-code-bg);
                border-radius: 10px;
            }

            .table-rwd tbody tr td {
                display: block;
                overflow: hidden; /* 處理版面 overflow, 可分為 overflow-x 與 overflow-y */
            }

            /* 偽元素 */
            .table-rwd tbody tr td::before {
                content: attr(data-th) " : ";
                font-size: 20px;
                font-weight: bold;
                color: var(--color-danger);
                display: block;
                float: left;
                width: 30%;
                text-align: right;
                padding-right: 2em;
            }

            .table-rwd tbody tr td span {
                display: block;
                float: left;
                width: 70%;
            }
        }
    </style>
